<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0c0f20">
<title>Школьная форма — Коллекция</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
(function(){
  var theme='night';
  try{theme=localStorage.getItem('school-theme')||'night';}catch(e){}
  document.documentElement.dataset.theme=theme;
  var meta=document.querySelector('meta[name="theme-color"]');
  if(meta)meta.content=theme==='day'?'#edf5ff':'#0c0f20';
})();
</script>
<style>
:root{
  --bg:#141b3e;--bg-2:#0f1430;
  --surface:rgba(255,255,255,.05);--line:rgba(255,255,255,.1);
  --gold:#cda86b;--gold-soft:#e3c894;--steel:#8fa0c2;
  --ink:#f4f2eb;--muted:#aab6cf;
  --shadow:0 24px 60px -20px rgba(0,0,0,.75);
  --photo-filter:brightness(.72) saturate(1.08) contrast(1.08);
  --photo-overlay:
    radial-gradient(circle at 50% 28%,rgba(9,16,38,.08),rgba(5,9,22,.48) 58%,rgba(4,7,18,.78) 100%),
    linear-gradient(180deg,rgba(5,8,20,.52) 0%,rgba(8,10,22,.24) 34%,rgba(8,10,22,.38) 58%,rgba(4,6,16,.86) 100%);
  --hero-copy:#eef3fb;--hint:#d7dfed;
  --detail-topbar:linear-gradient(180deg,rgba(20,27,62,.92),transparent);
  --cta-fade:linear-gradient(0deg,var(--bg) 55%,transparent);
  --lightbox-bg:rgba(6,8,18,.98);
  --switch-bg:rgba(8,12,28,.56);--switch-line:rgba(255,255,255,.16);
  --switch-ink:#e9eef8;--switch-active:#e3c894;--switch-active-ink:#14110b;
}
[data-theme="day"]{
  --bg:#edf5ff;--bg-2:#dcecff;
  --surface:rgba(255,255,255,.68);--line:rgba(20,42,76,.16);
  --gold:#1f3656;--gold-soft:#7b562c;--steel:#556985;
  --ink:#13243f;--muted:#526783;
  --shadow:0 18px 42px -24px rgba(25,48,82,.35);
  --photo-filter:brightness(1.2) saturate(.78) contrast(.86);
  --photo-overlay:
    radial-gradient(circle at 50% 28%,rgba(255,255,255,.18),rgba(232,243,255,.42) 58%,rgba(230,241,255,.74) 100%),
    linear-gradient(180deg,rgba(238,247,255,.68) 0%,rgba(255,255,255,.28) 34%,rgba(245,250,255,.34) 58%,rgba(231,242,255,.92) 100%);
  --hero-copy:#172841;--hint:#21324e;
  --detail-topbar:linear-gradient(180deg,rgba(237,245,255,.96),transparent);
  --cta-fade:linear-gradient(0deg,var(--bg) 55%,transparent);
  --lightbox-bg:rgba(235,244,255,.98);
  --switch-bg:rgba(255,255,255,.68);--switch-line:rgba(20,42,76,.18);
  --switch-ink:#203450;--switch-active:#13243f;--switch-active-ink:#f8fbff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--ink);font-family:'Manrope',system-ui,sans-serif;overflow-x:hidden}
body{position:relative;min-height:100vh}
img{display:block;width:100%;height:auto}
::selection{background:var(--gold);color:#0c0f20}

/* background photo only */
.bgphoto{position:fixed;inset:0;z-index:0;overflow:hidden}
.bgphoto img{width:100%;height:100%;object-fit:cover;object-position:center 45%;filter:var(--photo-filter);transition:filter .35s ease}
.bgphoto::after{content:"";position:absolute;inset:0;background:var(--photo-overlay);transition:background .35s ease}

.wrap{position:relative;z-index:2;max-width:560px;margin:0 auto;padding:0 22px}

.theme-switch{position:fixed;top:calc(env(safe-area-inset-top,0px) + 12px);left:50%;z-index:30;
  transform:translateX(-50%);display:grid;grid-template-columns:1fr 1fr;gap:3px;width:min(250px,calc(100vw - 44px));
  padding:4px;border:1px solid var(--switch-line);border-radius:999px;background:var(--switch-bg);
  box-shadow:0 14px 34px -20px rgba(0,0,0,.55);backdrop-filter:blur(14px);transition:background .3s,border-color .3s}
.theme-switch button{height:34px;border:0;border-radius:999px;background:transparent;color:var(--switch-ink);
  font:600 12px/1 'Manrope',system-ui,sans-serif;letter-spacing:.15em;text-transform:uppercase;cursor:pointer}
.theme-switch button.active{background:var(--switch-active);color:var(--switch-active-ink);box-shadow:0 8px 18px -12px rgba(0,0,0,.7)}
.theme-switch button:focus-visible{outline:2px solid var(--gold-soft);outline-offset:2px}
[data-theme="day"] .eyebrow,
[data-theme="day"] .hero h1,
[data-theme="day"] .hero p.sub,
[data-theme="day"] .scrollhint{text-shadow:0 1px 14px rgba(255,255,255,.9),0 1px 2px rgba(255,255,255,.85)}

/* HERO */
.hero{min-height:100svh;display:flex;flex-direction:column;justify-content:space-between;position:relative;
  padding:calc(env(safe-area-inset-top,0px) + 42px) 0 calc(env(safe-area-inset-bottom,0px) + 30px)}
.hero-top{max-width:390px;padding-top:clamp(4px,4svh,44px)}
.hero-bottom{max-width:430px;padding-top:28px}
.hero-video{position:absolute;right:0;z-index:3;width:clamp(82px,25vw,116px);
  aspect-ratio:9/16;border:1px solid rgba(227,200,148,.42);border-radius:24px;overflow:hidden;
  background:rgba(7,11,25,.58);box-shadow:0 24px 56px -18px rgba(0,0,0,.9),0 0 34px -18px rgba(227,200,148,.5),inset 0 0 0 1px rgba(255,255,255,.07);
  backdrop-filter:blur(10px);opacity:0;transform:translateY(18px) scale(.96);
  animation:videoIn .9s .78s cubic-bezier(.2,.7,.2,1) forwards}
.hero-video--top{top:clamp(176px,25svh,218px)}
.hero-video--bottom{top:clamp(392px,51.5svh,446px);animation-delay:.95s}
.hero-video::before{content:"";position:absolute;inset:0;z-index:2;
  background:linear-gradient(180deg,rgba(4,7,17,.18),rgba(4,7,17,.36)),
    linear-gradient(160deg,rgba(255,255,255,.12),transparent 28%,transparent 68%,rgba(205,168,107,.16));
  pointer-events:none}
.hero-video::after{content:"";position:absolute;inset:8px;border:1px solid rgba(255,255,255,.13);border-radius:18px;z-index:3;pointer-events:none}
.hero-video video{width:100%;height:100%;object-fit:cover;filter:brightness(.66) saturate(.78) contrast(1.04)}
[data-theme="day"] .hero-video{border-color:rgba(19,36,63,.38);background:rgba(255,255,255,.44);
  box-shadow:0 18px 40px -24px rgba(19,36,63,.55),inset 0 0 0 1px rgba(255,255,255,.58)}
.eyebrow{font-size:12px;letter-spacing:.42em;text-transform:uppercase;color:var(--gold);font-weight:600;
  opacity:0;transform:translateY(14px);animation:rise .9s .2s cubic-bezier(.2,.7,.2,1) forwards;text-shadow:0 2px 18px rgba(0,0,0,.6)}
.eyebrow::before{content:"";display:inline-block;width:26px;height:1px;background:var(--gold);vertical-align:middle;margin-right:12px;opacity:.7}
.hero h1{font-family:'Cormorant',serif;font-weight:500;line-height:.9;letter-spacing:.01em;margin:18px 0 0;
  font-size:clamp(50px,14.5vw,86px);text-shadow:0 6px 36px rgba(0,0,0,.72)}
.hero h1 .l1{display:block;opacity:0;transform:translateY(26px);animation:rise 1s .35s cubic-bezier(.2,.7,.2,1) forwards}
.hero h1 .l2{display:block;color:var(--gold-soft);font-style:italic;opacity:0;transform:translateY(26px);animation:rise 1s .5s cubic-bezier(.2,.7,.2,1) forwards}
.hero p.sub{margin:0;color:var(--hero-copy);font-size:15px;line-height:1.62;font-weight:300;
  opacity:0;transform:translateY(18px);animation:rise 1s .7s cubic-bezier(.2,.7,.2,1) forwards;text-shadow:0 2px 16px rgba(0,0,0,.9)}
.scrollhint{margin:24px auto 0;display:flex;flex-direction:column;align-items:center;gap:8px;
  font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--hint);opacity:0;animation:fade 1s 1.05s forwards;text-shadow:0 2px 12px rgba(0,0,0,.8)}
.scrollhint .line{width:1px;height:34px;background:linear-gradient(var(--gold),transparent);animation:drop 2s ease-in-out infinite}
@keyframes drop{0%,100%{transform:scaleY(.4);transform-origin:top;opacity:.4}50%{transform:scaleY(1);opacity:1}}
@keyframes rise{to{opacity:1;transform:translateY(0)}}
@keyframes fade{to{opacity:1}}
@keyframes videoIn{to{opacity:1;transform:translateY(0) scale(1)}}

/* CATALOG */
.catalog{padding:30px 0 80px}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px}
.sec-head h2{font-family:'Cormorant',serif;font-weight:500;font-size:30px;letter-spacing:.01em;text-shadow:0 2px 22px rgba(0,0,0,.7)}
.sec-head span{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);font-weight:600;text-shadow:0 2px 12px rgba(0,0,0,.6)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{position:relative;border-radius:20px;overflow:hidden;background:var(--surface);border:1px solid var(--line);
  aspect-ratio:3/4;box-shadow:var(--shadow);opacity:0;transform:translateY(24px) scale(.98);cursor:pointer;
  transition:transform .5s cubic-bezier(.2,.7,.2,1)}
.card.in{animation:cardin .7s cubic-bezier(.2,.7,.2,1) forwards}
@keyframes cardin{to{opacity:1;transform:translateY(0) scale(1)}}
.card:active{transform:scale(.97)}
.card img{width:100%;height:100%;object-fit:cover;transition:transform .7s cubic-bezier(.2,.7,.2,1)}
.card:hover img{transform:scale(1.05)}
.card .sheen{position:absolute;inset:0;background:linear-gradient(160deg,rgba(255,255,255,.12),transparent 40%);pointer-events:none}
.card.ph{display:flex;align-items:center;justify-content:center;background:linear-gradient(150deg,rgba(20,30,56,.8),rgba(14,20,40,.8));cursor:default}
.card.ph::after{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.05) 50%,transparent 70%);
  background-size:220% 100%;animation:shimmer 3.4s linear infinite}
@keyframes shimmer{to{background-position:-220% 0}}
.card.ph .ph-in{display:flex;flex-direction:column;align-items:center;gap:10px;z-index:1}
.card.ph .ph-in .n{font-family:'Cormorant',serif;font-size:34px;color:rgba(205,168,107,.55)}
.card.ph .ph-in .plus{width:30px;height:30px;border:1px solid rgba(255,255,255,.16);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:300;color:var(--muted)}

.foot{text-align:center;padding:30px 0 50px;color:var(--steel);font-size:12px;letter-spacing:.04em;text-shadow:0 2px 12px rgba(0,0,0,.6)}
.foot .div{width:40px;height:1px;background:var(--line);margin:0 auto 18px}

/* DETAIL */
.detail{position:fixed;inset:0;z-index:50;background:var(--bg);transform:translateY(100%);
  transition:transform .5s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column;visibility:hidden}
.detail.open{transform:translateY(0);visibility:visible}
.detail .topbar{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;
  padding:calc(env(safe-area-inset-top,0px) + 16px) 18px 16px;background:var(--detail-topbar)}
.backbtn{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.09);border:1px solid var(--line);
  color:var(--ink);border-radius:30px;padding:9px 16px 9px 12px;font-size:14px;font-weight:500;font-family:inherit;
  backdrop-filter:blur(10px);cursor:pointer}
.backbtn svg{width:16px;height:16px}
.dtitle{font-family:'Cormorant',serif;font-size:18px;color:var(--ink);letter-spacing:.02em}

.gallery{flex:1;overflow:hidden;position:relative;touch-action:pan-y;width:100%;
  padding:calc(env(safe-area-inset-top,0px) + 76px) 0 calc(env(safe-area-inset-bottom,0px) + 132px)}
.gtrack{display:flex;width:100%;height:100%;will-change:transform}
.g-slide{width:100%;min-width:100%;max-width:100%;flex:0 0 100%;display:flex;align-items:center;justify-content:center;overflow:hidden}
.g-slide img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;cursor:zoom-in;-webkit-user-drag:none;user-select:none}

.dots{position:absolute;bottom:116px;left:0;right:0;display:flex;justify-content:center;gap:7px;z-index:10;pointer-events:none}
.dots i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.28);transition:all .3s}
.dots i.on{background:var(--gold);width:20px;border-radius:4px}

.cta-bar{position:absolute;bottom:0;left:0;right:0;padding:18px 18px calc(env(safe-area-inset-bottom,0px) + 22px);
  background:var(--cta-fade);z-index:10}
.wa-btn{display:flex;align-items:center;justify-content:center;gap:11px;width:100%;
  background:linear-gradient(135deg,var(--gold),var(--gold-soft));color:#15110a;
  border:none;border-radius:16px;padding:17px;font-family:inherit;font-size:16px;font-weight:700;letter-spacing:.01em;
  box-shadow:0 14px 30px -8px rgba(205,168,107,.5);cursor:pointer;text-decoration:none}
.wa-btn:active{transform:scale(.985)}
.wa-btn svg{width:21px;height:21px}

/* FULLSCREEN */
.lightbox{position:fixed;inset:0;z-index:60;background:var(--lightbox-bg);opacity:0;visibility:hidden;overflow:hidden;
  transition:opacity .28s ease}
.lightbox.open{opacity:1;visibility:visible}
.lb-viewport{position:absolute;inset:0;overflow:hidden;touch-action:none;width:100%}
.lb-track{display:flex;width:100%;height:100%;will-change:transform}
.lb-slide{width:100%;min-width:100%;max-width:100%;flex:0 0 100%;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:0 12px}
.lb-slide img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;transform-origin:center center;will-change:transform;
  -webkit-user-drag:none;user-select:none}
.lb-close{position:absolute;top:calc(env(safe-area-inset-top,0px) + 14px);right:16px;z-index:5;
  width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid var(--line);
  color:#fff;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);cursor:pointer}
.lb-close svg{width:20px;height:20px}
.lb-dots{position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 20px);left:0;right:0;display:flex;justify-content:center;gap:7px;z-index:5;pointer-events:none}
.lb-dots i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);transition:all .3s}
.lb-dots i.on{background:var(--gold);width:20px;border-radius:4px}

@media (prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;animation-iteration-count:1!important}
}
</style>
</head>

<script>
const themeBtns=[...document.querySelectorAll('[data-theme-choice]')];
function setTheme(theme){
  const next=theme==='day'?'day':'night';
  document.documentElement.dataset.theme=next;
  try{localStorage.setItem('school-theme',next);}catch(e){}
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta)meta.content=next==='day'?'#edf5ff':'#0c0f20';
  themeBtns.forEach(btn=>{
    const on=btn.dataset.themeChoice===next;
    btn.classList.toggle('active',on);
    btn.setAttribute('aria-pressed',on?'true':'false');
  });
}
themeBtns.forEach(btn=>btn.addEventListener('click',()=>setTheme(btn.dataset.themeChoice)));
setTheme(document.documentElement.dataset.theme||'night');

const MODELS=[
  {id:1,title:"Жилет + юбка",photos:["images/m1_01.webp","images/m1_02.webp","images/m1_03.webp","images/m1_04.webp"]},
  {id:2,title:"Жилет + юбка + галстук",photos:["images/m2_01.webp","images/m2_02.webp","images/m2_03.webp","images/m2_04.webp","images/m2_05.webp"]}
];
const TOTAL=10;

/* ---------- swipe carousel ---------- */
class Carousel{
  constructor(vp,track,opts){
    this.vp=vp;this.track=track;this.opts=opts||{};
    this.index=0;this.n=0;this.dragX=0;
    this.scale=1;this.tx=0;this.ty=0;
    this.mode=null;this.startX=0;this.startY=0;this.lastX=0;this.lastY=0;
    this.startTime=0;this.moved=false;this.lastTap=0;this.lastTouchEnd=0;this.startDist=0;this.baseScale=0;
    this._bind();
    window.addEventListener('resize',()=>this._place(false));
  }
  setImages(srcs){
    this.track.innerHTML='';this.srcs=srcs;
    srcs.forEach(s=>{const sl=document.createElement('div');sl.className=this.opts.slideClass;
      sl.innerHTML='<img src="'+s+'" draggable="false" alt="">';this.track.appendChild(sl);});
    this.n=srcs.length;this._dots();this.index=0;this._resetZoom();this._place(false);
  }
  _dots(){const d=this.opts.dots;if(!d)return;d.innerHTML='';for(let i=0;i<this.n;i++){const x=document.createElement('i');if(i===0)x.classList.add('on');d.appendChild(x);}}
  _upDots(){const d=this.opts.dots;if(!d)return;[...d.children].forEach((x,i)=>x.classList.toggle('on',i===this.index));}
  _w(){return this.vp.clientWidth;}
  _place(anim){this.track.style.transition=anim?'transform .42s cubic-bezier(.22,.61,.36,1)':'none';
    this.track.style.transform='translateX('+(-this.index*this._w()+this.dragX)+'px)';}
  goTo(i,anim){this.index=Math.max(0,Math.min(this.n-1,i));this.dragX=0;this._resetZoom();this._place(anim!==false);this._upDots();}
  _img(){const sl=this.track.children[this.index];return sl?sl.querySelector('img'):null;}
  _applyZoom(){const im=this._img();if(im)im.style.transform='translate('+this.tx+'px,'+this.ty+'px) scale('+this.scale+')';}
  _resetZoom(){const im=this._img();this.scale=1;this.tx=0;this.ty=0;if(im){im.style.transition='none';im.style.transform='';}}
  _smooth(){const im=this._img();if(im){im.style.transition='transform .22s ease';setTimeout(()=>{if(im)im.style.transition='none';},240);}}
  _clamp(){const im=this._img();if(!im)return;const r=im.getBoundingClientRect();
    const mx=Math.max(0,(r.width-window.innerWidth)/2+30),my=Math.max(0,(r.height-window.innerHeight)/2+30);
    this.tx=Math.max(-mx,Math.min(mx,this.tx));this.ty=Math.max(-my,Math.min(my,this.ty));}
  _toggleZoom(cx,cy){if(!this.opts.zoom)return;this._smooth();
    if(this.scale>1.02){this.scale=1;this.tx=0;this.ty=0;}
    else{this.scale=2.4;this.tx=(window.innerWidth/2-cx)*(this.scale-1);this.ty=(window.innerHeight/2-cy)*(this.scale-1);this._clamp();}
    this._applyZoom();}
  _dist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}
  _bind(){
    const vp=this.vp;
    vp.addEventListener('touchstart',e=>{
      this.moved=false;this.startTime=Date.now();
      if(e.touches.length===2&&this.opts.zoom){this.mode='pinch';this.startDist=this._dist(e.touches);this.baseScale=this.scale;const im=this._img();if(im)im.style.transition='none';}
      else if(e.touches.length===1){
        this.startX=this.lastX=e.touches[0].clientX;this.startY=this.lastY=e.touches[0].clientY;
        const now=Date.now();
        if(this.opts.zoom&&now-this.lastTap<300){this._toggleZoom(this.startX,this.startY);this.mode='dt';}
        else this.mode=(this.opts.zoom&&this.scale>1.02)?'pan':'page';
        this.lastTap=now;
      }
    },{passive:false});
    vp.addEventListener('touchmove',e=>{
      if(this.mode==='pinch'&&e.touches.length===2){e.preventDefault();this.moved=true;
        this.scale=Math.max(1,Math.min(4,this.baseScale*(this._dist(e.touches)/this.startDist)));this._applyZoom();}
      else if(this.mode==='pan'&&e.touches.length===1){e.preventDefault();this.moved=true;
        this.tx+=e.touches[0].clientX-this.lastX;this.ty+=e.touches[0].clientY-this.lastY;
        this.lastX=e.touches[0].clientX;this.lastY=e.touches[0].clientY;this._clamp();this._applyZoom();}
      else if(this.mode==='page'&&e.touches.length===1){
        const dx=e.touches[0].clientX-this.startX,dy=e.touches[0].clientY-this.startY;
        if(Math.abs(dx)>10||Math.abs(dy)>10)this.moved=true;
        if(Math.abs(dx)>Math.abs(dy)){e.preventDefault();
          const edge=((this.index===0&&dx>0)||(this.index===this.n-1&&dx<0))?0.32:1;
          this.dragX=dx*edge;this._place(false);}
      }
    },{passive:false});
    vp.addEventListener('touchend',e=>{
      if(this.mode==='page'){
        if(!this.moved&&this.opts.onTap&&Date.now()-this.startTime<400){this.opts.onTap(this.index,e);}
        else{const w=this._w();
          if(this.dragX<-w*0.16&&this.index<this.n-1)this.index++;
          else if(this.dragX>w*0.16&&this.index>0)this.index--;
          this.dragX=0;this._place(true);this._upDots();}
      }else if(this.mode==='pinch'){if(this.scale<=1.02)this._resetZoom();else{this._clamp();this._applyZoom();}}
      this.lastTouchEnd=Date.now();
      this.mode=null;
    },{passive:false});
    vp.addEventListener('click',e=>{
      if(!this.opts.onTap||Date.now()-this.lastTouchEnd<450)return;
      this.opts.onTap(this.index,e);
    });
  }
}

/* ---------- catalog ---------- */
const grid=document.getElementById('grid');
for(let i=0;i<TOTAL;i++){
  const m=MODELS[i];const card=document.createElement('div');
  card.className='card';card.style.animationDelay=(i*0.07)+'s';
  if(m){card.innerHTML='<img src="'+m.photos[0]+'" alt=""><div class="sheen"></div>';card.addEventListener('click',()=>openModel(m));}
  else{card.classList.add('ph');card.innerHTML='<div class="ph-in"><div class="n">'+(i+1)+'</div><div class="plus">+</div></div>';}
  grid.appendChild(card);
}
const io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.12});
document.querySelectorAll('.card').forEach(c=>io.observe(c));

/* ---------- instances ---------- */
const detail=document.getElementById('detail');
const lightbox=document.getElementById('lightbox');
const dtitle=document.getElementById('dtitle');
const wa=document.getElementById('wa');
const waPhone=(wa.getAttribute('href').match(/wa\.me\/([^?]+)/)||[])[1]||'0000000000';

const galleryCar=new Carousel(document.getElementById('gallery'),document.getElementById('gtrack'),
  {slideClass:'g-slide',dots:document.getElementById('dots'),zoom:false,onTap:(i)=>openPhoto(i)});
const fullCar=new Carousel(document.getElementById('lbViewport'),document.getElementById('lbTrack'),
  {slideClass:'lb-slide',dots:document.getElementById('lbDots'),zoom:true});

let currentModel=null;
let currentView='home';
function modelById(id){return MODELS.find(m=>String(m.id)===String(id));}
function modelName(m){return m.title||('Модель '+m.id);}
function setWhatsApp(m){
  wa.href='https://wa.me/'+waPhone+'?text='+encodeURIComponent('Здравствуйте! Интересует школьная форма ('+modelName(m)+')');
}
function prepareModel(m){
  currentModel=m;galleryCar.setImages(m.photos);dtitle.textContent=modelName(m);setWhatsApp(m);
}
function openModel(m){
  prepareModel(m);hidePhoto();showDetail();currentView='detail';pushView('detail',m.id,0);
}
function showDetail(){detail.classList.add('open');document.body.style.overflow='hidden';}
function hideDetail(){detail.classList.remove('open');document.body.style.overflow='';}
document.getElementById('back').addEventListener('click',goBack);

function openPhoto(i){
  if(!currentModel)return;
  fullCar.setImages(currentModel.photos);fullCar.goTo(i,false);
  showPhoto();currentView='photo';pushView('photo',currentModel.id,i);
}
function showPhoto(){lightbox.classList.add('open');}
function hidePhoto(){lightbox.classList.remove('open');}
document.getElementById('lbClose').addEventListener('click',goBack);

/* ---------- history (phone Back) ---------- */
function baseUrl(){return location.href.split('#')[0];}
function viewUrl(view,modelId,photoIndex){
  if(view==='photo')return baseUrl()+'#model-'+modelId+'-photo-'+(photoIndex||0);
  if(view==='detail')return baseUrl()+'#model-'+modelId;
  return baseUrl();
}
function routeFromHash(){
  const h=location.hash.slice(1);
  const p=h.match(/^model-(\d+)-photo-(\d+)$/);
  const d=h.match(/^model-(\d+)$/);
  if(p)return {view:'photo',modelId:p[1],photoIndex:Number(p[2])||0};
  if(d)return {view:'detail',modelId:d[1],photoIndex:0};
  return {view:'home',modelId:null,photoIndex:0};
}
function routeFromState(state){return state&&state.view?state:routeFromHash();}
function replaceView(view,modelId,photoIndex){
  try{history.replaceState({view,modelId,photoIndex},'',viewUrl(view,modelId,photoIndex));}catch(e){}
}
function pushView(view,modelId,photoIndex){
  const state={view,modelId,photoIndex};
  try{history.pushState(state,'',viewUrl(view,modelId,photoIndex));}
  catch(e){location.hash=view==='home'?'':'model-'+modelId+(view==='photo'?'-photo-'+(photoIndex||0):'');}
}
function applyRoute(route){
  const view=route&&route.view?route.view:'home';
  if(view==='home'){
    currentView='home';hidePhoto();hideDetail();return;
  }
  const m=modelById(route.modelId)||MODELS[0];
  if(!m){currentView='home';hidePhoto();hideDetail();return;}
  prepareModel(m);showDetail();
  if(view==='photo'){
    const photoIndex=Math.max(0,Math.min(m.photos.length-1,route.photoIndex||0));
    fullCar.setImages(m.photos);fullCar.goTo(photoIndex,false);showPhoto();currentView='photo';
  }else{
    hidePhoto();currentView='detail';
  }
}
function goBack(){
  const before=currentView;
  try{history.back();}catch(e){}
  setTimeout(()=>{
    if(currentView!==before)return;
    if(before==='photo'){hidePhoto();currentView='detail';if(currentModel)replaceView('detail',currentModel.id,0);}
    else if(before==='detail'){hidePhoto();hideDetail();currentView='home';replaceView('home',null,0);}
  },140);
}
function initHistory(){
  const initial=routeFromHash();
  if(initial.view==='home')replaceView('home',null,0);
  else{
    try{
      history.replaceState({view:'home',modelId:null,photoIndex:0},'',baseUrl());
      history.pushState(initial,'',viewUrl(initial.view,initial.modelId,initial.photoIndex));
    }catch(e){}
  }
  applyRoute(initial);
}
window.addEventListener('popstate',e=>applyRoute(routeFromState(e.state)));
window.addEventListener('hashchange',()=>applyRoute(routeFromHash()));
initHistory();
